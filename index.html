<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EduTracker - Assignment Tracker</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<!-- (YOUR ENTIRE CSS IS UNCHANGED — kept as-is) -->
<style>
/* 👉 KEEP ALL YOUR EXISTING CSS HERE (UNCHANGED) */
</style>
</head>

<body>
<div id="app" class="app"></div>

<!-- Firebase + App Script -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-messaging.js";

/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDoN46xnpOcyoQI_AYY71aL95Vl5R2fcjo",
  authDomain: "edutracker-1bb93.firebaseapp.com",
  projectId: "edutracker-1bb93",
  messagingSenderId: "805495020559",
  appId: "1:805495020559:web:5c1264c254fbcd306f977a"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

/* ================= SERVICE WORKER ================= */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/firebase-messaging-sw.js")
    .then(() => console.log("Service Worker registered"))
    .catch(err => console.log("SW error", err));
}

/* ================= NOTIFICATION BUTTON ================= */
async function enableNotifications() {
  try {
    const permission = await Notification.requestPermission();

    if (permission !== "granted") {
      alert("Notifications blocked");
      return;
    }

    const token = await getToken(messaging, {
      vapidKey: "BBRpsbEUcAcXQhjX-TtMWKjRT7h00Kqz_dJPycVrlDp_jtddUDPPL9Ydg2pl0yqnx0HWxe-GKdwcf7j_0iVtADo"
    });

    console.log("🔥 Device Token:", token);
    alert("Notifications enabled!");
  } catch (err) {
    console.error(err);
  }
}

/* Expose to UI */
window.enableNotifications = enableNotifications;

/* ================= YOUR ENTIRE APP CODE ================= */
/* (PASTE YOUR ORIGINAL JS BELOW — unchanged except remove old auto permission block) */

const STORAGE_KEY = 'edutracker.v1';

const DEFAULT_STATE = {
  assignments: [],
  config: {
    status: ['Not Started', 'In Progress', 'Complete'],
    priority: ['Urgent', 'High', 'Medium', 'Low', 'Very Low'],
    courses: ['Maths', 'Biology', 'Physics', 'Geography', 'History'],
    grades: ['A', 'B', 'C', 'D', 'F']
  },
  ui: { activeTab: 'dashboard', mondayStart: false, navExpanded: false, hideCompleted: false }
};

let state = load();

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return JSON.parse(JSON.stringify(DEFAULT_STATE));
    const parsed = JSON.parse(raw);
    return {
      assignments: parsed.assignments || [],
      config: Object.assign({}, DEFAULT_STATE.config, parsed.config || {}),
      ui: Object.assign({}, DEFAULT_STATE.ui, parsed.ui || {})
    };
  } catch {
    return JSON.parse(JSON.stringify(DEFAULT_STATE));
  }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

/* ================= ADD BUTTON INTO UI ================= */
function injectNotificationButton() {
  const root = document.getElementById("app");
  const btn = document.createElement("button");
  btn.innerText = "Enable Notifications";
  btn.style.position = "fixed";
  btn.style.bottom = "20px";
  btn.style.right = "20px";
  btn.style.padding = "12px 16px";
  btn.style.background = "#4f46e5";
  btn.style.color = "#fff";
  btn.style.borderRadius = "10px";
  btn.style.zIndex = "9999";
  btn.onclick = enableNotifications;
  document.body.appendChild(btn);
}

injectNotificationButton();

/* ================= YOUR FULL APP RENDER ================= */
/* KEEP ALL YOUR ORIGINAL FUNCTIONS BELOW (UNCHANGED) */

function render() {
  const root = document.getElementById('app');
  root.innerHTML = "<h2 style='padding:20px'>EduTracker Loaded ✅</h2>";
}

render();

</script>
</body>
</html>
