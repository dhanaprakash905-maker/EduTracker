<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduTracker Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#2563eb;
    color:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:22px;
    font-weight:bold;
}

.notification-wrapper{
    position:relative;
}

.bell{
    font-size:28px;
    cursor:pointer;
}

.badge{
    position:absolute;
    top:-5px;
    right:-5px;
    background:red;
    color:white;
    border-radius:50%;
    min-width:20px;
    height:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
}

.notification-panel{
    position:absolute;
    top:40px;
    right:0;
    width:320px;
    background:white;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
    display:none;
    overflow:hidden;
    z-index:999;
}

.notification-header{
    background:#2563eb;
    color:white;
    padding:10px;
    font-weight:bold;
}

.notification-list{
    max-height:350px;
    overflow-y:auto;
}

.notification-item{
    padding:12px;
    border-bottom:1px solid #eee;
}

.notification-title{
    font-weight:bold;
}

.notification-time{
    font-size:12px;
    color:#777;
    margin-top:5px;
}

.container{
    max-width:1200px;
    margin:20px auto;
    padding:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.card h3{
    margin-bottom:10px;
}

.assignment-table{
    width:100%;
    margin-top:25px;
    border-collapse:collapse;
    background:white;
}

.assignment-table th,
.assignment-table td{
    padding:12px;
    border:1px solid #ddd;
}

.assignment-table th{
    background:#2563eb;
    color:white;
}

.btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
    margin-top:15px;
}

.btn:hover{
    opacity:0.9;
}
</style>
</head>

<body>

<header>
    <div class="logo">📘 EduTracker</div>

    <div class="notification-wrapper">
        <div class="bell" onclick="toggleNotifications()">🔔</div>
        <div class="badge" id="badge">3</div>

        <div class="notification-panel" id="notificationPanel">
            <div class="notification-header">
                Notifications
            </div>

            <div class="notification-list" id="notificationList">
            </div>
        </div>
    </div>
</header>

<div class="container">

    <div class="cards">
        <div class="card">
            <h3>Total Assignments</h3>
            <h2>18</h2>
        </div>

        <div class="card">
            <h3>Completed</h3>
            <h2>10</h2>
        </div>

        <div class="card">
            <h3>Pending</h3>
            <h2>8</h2>
        </div>

        <div class="card">
            <h3>Today's Tasks</h3>
            <h2>4</h2>
        </div>
    </div>

    <button class="btn" onclick="addNotification()">
        Add Demo Notification
    </button>

    <table class="assignment-table">
        <thead>
            <tr>
                <th>Subject</th>
                <th>Assignment</th>
                <th>Due Date</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Math</td>
                <td>Chapter 5 Exercise</td>
                <td>20 Jun 2026</td>
                <td>Pending</td>
            </tr>

            <tr>
                <td>Science</td>
                <td>Lab Report</td>
                <td>18 Jun 2026</td>
                <td>Completed</td>
            </tr>

            <tr>
                <td>English</td>
                <td>Essay Writing</td>
                <td>22 Jun 2026</td>
                <td>Pending</td>
            </tr>
        </tbody>
    </table>

</div>

<script>

let notifications = [
{
title:"New Assignment Added",
message:"Math assignment has been assigned.",
time:"Just now"
},
{
title:"Schedule Updated",
message:"Today's timetable updated.",
time:"10 min ago"
},
{
title:"Reminder",
message:"Submit Science report tomorrow.",
time:"1 hour ago"
}
];

function renderNotifications(){

const list =
document.getElementById("notificationList");

list.innerHTML="";

notifications.forEach(item=>{

list.innerHTML += `
<div class="notification-item">
<div class="notification-title">${item.title}</div>
<div>${item.message}</div>
<div class="notification-time">${item.time}</div>
</div>
`;

});

document.getElementById("badge")
.innerText = notifications.length;
}

function toggleNotifications(){

const panel =
document.getElementById("notificationPanel");

panel.style.display =
panel.style.display==="block"
? "none"
: "block";
}

function addNotification(){

notifications.unshift({
title:"New Product Update",
message:"A new update was added to EduTracker.",
time:new Date().toLocaleTimeString()
});

renderNotifications();
}

renderNotifications();

</script>

</body>
</html>
